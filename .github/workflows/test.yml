name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm install --include=optional
      - name: Run tests (bounded)
        run: timeout 55m npm run test:ci
      - run: node bin/thai-token-optimizer.js benchmark --strict --default-policy
      - run: test "$(node -p "require('./package.json').version")" = "1.0.0"
