name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm install --include=optional
      - run: npm test
      - run: node bin/thai-token-optimizer.js benchmark --strict --default-policy
      - run: test "$(node -p "require('./package.json').version")" = "1.0.0"
