name: release-check

on:
  workflow_dispatch:
  push:
    tags:
      - 'v2.0*'

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm install --include=optional
      - run: timeout 55m npm run test:ci
      - run: node bin/thai-token-optimizer.js benchmark --strict --default-policy
      - run: node bin/thai-token-optimizer.js config get
      - run: test "$(node -p "require('./package.json').version")" = "2.0.0"
      - run: grep -R "Thai Token Optimizer v2.0" README.md AGENTS.md benchmarks || true
