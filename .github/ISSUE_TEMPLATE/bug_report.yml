name: Bug report
description: Report a reproducible bug in Thai Token Optimizer v2.0.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please keep package identity as `Thai Token Optimizer v2.0 / 2.0.0`.

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `node -p "require('./package.json').version"`
      placeholder: "2.0.0"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Pretty CLI UI
        - Codex integration
        - Claude Code integration
        - Gemini CLI integration
        - OpenCode integration
        - OpenClaw integration
        - Hermes Agent integration
        - Cursor/Aider/Cline/Roo adapter
        - Compression
        - Safety classifier
        - Backup/Rollback
        - Benchmark/CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include exact commands.
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste output from `tto doctor --pretty` or `node bin/thai-token-optimizer.js doctor --ci`.
      render: text

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, npm version, AI tool used.
      render: text
