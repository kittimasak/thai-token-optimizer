<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840" role="img" aria-labelledby="title desc">
  <title id="title">MTP / Speculative Candidate Selection</title>
  <desc id="desc">Animated SVG diagram for Thai Token Optimizer showing speculative candidate families, preservation and budget scoring, and final candidate selection.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="34%" stop-color="#0a1538"/>
      <stop offset="68%" stop-color="#112b58"/>
      <stop offset="100%" stop-color="#0b665b"/>
    </linearGradient>

    <radialGradient id="orbPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.50"/>
      <stop offset="72%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.42"/>
      <stop offset="74%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="26%" stop-color="#818cf8"/>
      <stop offset="54%" stop-color="#38bdf8"/>
      <stop offset="78%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.055"/>
    </linearGradient>

    <linearGradient id="candidate1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.27"/>
      <stop offset="100%" stop-color="#08111f" stop-opacity="0.50"/>
    </linearGradient>
    <linearGradient id="candidate2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.27"/>
      <stop offset="100%" stop-color="#08111f" stop-opacity="0.50"/>
    </linearGradient>
    <linearGradient id="candidate3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.27"/>
      <stop offset="100%" stop-color="#08111f" stop-opacity="0.50"/>
    </linearGradient>
    <linearGradient id="candidate4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.27"/>
      <stop offset="100%" stop-color="#08111f" stop-opacity="0.50"/>
    </linearGradient>

    <filter id="shadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.46"/>
    </filter>


    <marker id="arrowPurple" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#c084fc"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#818cf8"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#4ade80"/>
    </marker>
    <marker id="arrowDown" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#67e8f9"/>
    </marker>

    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title { font-family: Inter, 'Noto Sans', 'Segoe UI', Tahoma, sans-serif; font-size: 42px; font-weight: 900; letter-spacing: -1px; fill: url(#titleGrad); }
      .subtitle { font-family: Inter, 'Noto Sans', 'Segoe UI', Tahoma, sans-serif; font-size: 17px; font-weight: 560; fill: #dbe7f5; }
      .cardTitle { font-family: Inter, 'Noto Sans', 'Segoe UI', Tahoma, sans-serif; font-size: 20px; font-weight: 860; fill: #f8fafc; }
      .cardText { font-family: Inter, 'Noto Sans', 'Segoe UI', Tahoma, sans-serif; font-size: 14px; font-weight: 650; fill: #d5e5f7; }
      .midTitle { font-family: Inter, 'Noto Sans', 'Segoe UI', Tahoma, sans-serif; font-size: 28px; font-weight: 900; fill: #f8fafc; }
      .midText { font-family: Inter, 'Noto Sans', 'Segoe UI', Tahoma, sans-serif; font-size: 16px; font-weight: 650; fill: #d7e7f8; }
      .small { font-family: Inter, 'Noto Sans', 'Segoe UI', Tahoma, sans-serif; font-size: 13px; font-weight: 700; fill: #cbd5e1; }
      .pillText { font-family: Inter, 'Noto Sans', 'Segoe UI', Tahoma, sans-serif; font-size: 12.5px; font-weight: 760; fill: #e5f2ff; }
      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; font-size: 14px; fill: #dbeafe; }

      .accentBar { animation: barPulse 3s ease-in-out infinite; }
      .orbit { fill: none; stroke: #38bdf8; stroke-width: 1.2; opacity: .14; stroke-dasharray: 4 13; animation: orbitSpin 22s linear infinite; transform-origin: 1140px 115px; }
      .particle { fill: #dbeafe; opacity: 0; animation: twinkle 4.2s ease-in-out infinite; }
      .p2 { animation-delay: .55s; } .p3 { animation-delay: 1.1s; } .p4 { animation-delay: 1.65s; } .p5 { animation-delay: 2.2s; }

      .card { stroke-width: 1.7; filter: url(#shadow); animation: floatCard 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .c2 { animation-delay: .2s; } .c3 { animation-delay: .4s; } .c4 { animation-delay: .6s; }
      .scoreCard { filter: url(#shadow); animation: floatCard 5.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .selectedCard { filter: url(#shadow); animation: floatCard 5.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }

      .lineGlow { stroke: url(#accent); stroke-width: 14; opacity: .11; stroke-linecap: round; fill: none; filter: url(#glow); }
      .lineMain { stroke: url(#accent); stroke-width: 4.8; stroke-linecap: round; fill: none; stroke-dasharray: 14 18; animation: dashFlow 2.2s linear infinite; }
      .lineSoft { stroke: rgba(255,255,255,.20); stroke-width: 2.4; stroke-linecap: round; fill: none; stroke-dasharray: 7 14; }
      .downMain { stroke: #67e8f9; stroke-width: 5.0; stroke-linecap: round; fill: none; stroke-dasharray: 15 18; animation: dashFlow 2.0s linear infinite; }
      .downGlow { stroke: #67e8f9; stroke-width: 14; stroke-linecap: round; opacity: .12; fill: none; filter: url(#glow); }
      .arrowPulse { animation: arrowPulse 2s ease-in-out infinite; }
      .nodePulse { animation: pulseNode 2.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .pulseRing { fill: none; stroke-width: 2; opacity: .28; animation: ringPulse 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .chip { filter: url(#shadow); animation: chipFloat 4.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .chip2 { animation-delay: .25s; } .chip3 { animation-delay: .5s; } .chip4 { animation-delay: .75s; }
      .dashDot { filter: url(#glow); opacity: .9; }

      @keyframes barPulse { 0%,100% { opacity: .82; } 50% { opacity: 1; } }
      @keyframes orbitSpin { to { transform: rotate(360deg); } }
      @keyframes twinkle { 0%,100% { opacity: 0; transform: translateX(0); } 42% { opacity: .85; } 72% { opacity: .25; transform: translateX(12px); } }
      @keyframes floatCard { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes chipFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      @keyframes dashFlow { to { stroke-dashoffset: -64; } }
      @keyframes arrowPulse { 0%,100% { opacity: .82; filter: url(#glow); } 50% { opacity: 1; filter: url(#glow); } }
      @keyframes pulseNode { 0%,100% { transform: scale(1); opacity: .86; } 50% { transform: scale(1.12); opacity: 1; } }
      @keyframes ringPulse { 0%,100% { transform: scale(1); opacity: .18; } 50% { transform: scale(1.22); opacity: .38; } }

      @media (prefers-reduced-motion: reduce) {
        .accentBar,.orbit,.particle,.card,.scoreCard,.selectedCard,.lineMain,.downMain,.arrowPulse,.nodePulse,.pulseRing,.chip { animation: none !important; }
      }
    </style>
  </defs>

  <rect width="1400" height="840" rx="32" fill="url(#bg)"/>
  <rect x="1" y="1" width="1398" height="838" rx="31" fill="none" stroke="rgba(255,255,255,.08)"/>

  <!-- ambience -->
  <circle cx="180" cy="670" r="260" fill="url(#orbPurple)"/>
  <circle cx="1185" cy="145" r="290" fill="url(#orbCyan)"/>
  <circle cx="720" cy="815" r="320" fill="#22d3ee" opacity=".04"/>
  <path class="orbit" d="M1024 110 C1098 8 1260 28 1300 144 C1342 264 1180 344 1102 258 C1038 190 1054 116 1144 80"/>
  <path class="orbit" opacity=".10" d="M968 152 C1068 4 1328 8 1380 206"/>
  <circle class="particle" cx="260" cy="168" r="2.0"/>
  <circle class="particle p2" cx="430" cy="124" r="1.7"/>
  <circle class="particle p3" cx="988" cy="238" r="1.9"/>
  <circle class="particle p4" cx="1188" cy="360" r="1.8"/>
  <circle class="particle p5" cx="670" cy="164" r="1.6"/>

  <!-- header -->
  <rect x="60" y="56" width="10" height="80" rx="5" fill="url(#accent)" class="accentBar"/>
  <text x="92" y="104" class="title">MTP / Speculative Candidate Selection</text>
  <text x="94" y="140" class="subtitle">Generate candidate families, score preservation and budget, then select the safest compact output</text>

  <!-- top candidate cards: wider spacing and wrapped text -->
  <g>
    <rect x="90" y="198" width="260" height="126" rx="24" fill="url(#candidate1)" stroke="#c084fc" class="card"/>
    <circle class="pulseRing" cx="136" cy="238" r="18" stroke="#c084fc"/>
    <circle class="nodePulse" cx="136" cy="238" r="10" fill="#c084fc"/>
    <text x="166" y="234" class="cardTitle">baseline</text>
    <text x="166" y="262" class="cardText">reference candidate</text>
    <text x="166" y="287" class="small">full preservation</text>
    <text x="166" y="306" class="small">larger token budget</text>

    <rect x="390" y="198" width="260" height="126" rx="24" fill="url(#candidate2)" stroke="#818cf8" class="card c2"/>
    <circle class="pulseRing" cx="436" cy="238" r="18" stroke="#818cf8"/>
    <circle class="nodePulse" cx="436" cy="238" r="10" fill="#818cf8"/>
    <text x="466" y="234" class="cardTitle">semantic_dedup</text>
    <text x="466" y="262" class="cardText">remove repeated meaning</text>
    <text x="466" y="287" class="small">balanced compactness</text>
    <text x="466" y="306" class="small">safer than hard trimming</text>

    <rect x="690" y="198" width="260" height="126" rx="24" fill="url(#candidate3)" stroke="#22d3ee" class="card c3"/>
    <circle class="pulseRing" cx="736" cy="238" r="18" stroke="#22d3ee"/>
    <circle class="nodePulse" cx="736" cy="238" r="10" fill="#22d3ee"/>
    <text x="766" y="234" class="cardTitle">selective_window</text>
    <text x="766" y="262" class="cardText">keep key context only</text>
    <text x="766" y="287" class="small">aggressive context</text>
    <text x="766" y="306" class="small">window trimming</text>

    <rect x="990" y="198" width="320" height="126" rx="24" fill="url(#candidate4)" stroke="#4ade80" class="card c4"/>
    <circle class="pulseRing" cx="1038" cy="238" r="18" stroke="#4ade80"/>
    <circle class="nodePulse" cx="1038" cy="238" r="10" fill="#4ade80"/>
    <text x="1070" y="234" class="cardTitle">dedup_plus_selective</text>
    <text x="1070" y="262" class="cardText">merge dedup + selective window</text>
    <text x="1070" y="287" class="small">compact with stronger</text>
    <text x="1070" y="306" class="small">preservation</text>
  </g>

  <!-- curved lines to score card with auto-oriented arrowheads and moving particles -->
  <g>
    <path id="path1" d="M220 324 C282 378 390 420 548 470" class="lineGlow"/>
    <path d="M220 324 C282 378 390 420 548 470" class="lineSoft"/>
    <path d="M220 324 C282 378 390 420 548 470" class="lineMain arrowPulse" marker-end="url(#arrowPurple)"/>
    <circle r="5" fill="#c084fc" class="dashDot">
      <animateMotion dur="3.6s" repeatCount="indefinite"><mpath href="#path1"/></animateMotion>
    </circle>

    <path id="path2" d="M520 324 C554 374 596 420 622 470" class="lineGlow"/>
    <path d="M520 324 C554 374 596 420 622 470" class="lineSoft"/>
    <path d="M520 324 C554 374 596 420 622 470" class="lineMain arrowPulse" marker-end="url(#arrowIndigo)"/>
    <circle r="5" fill="#818cf8" class="dashDot">
      <animateMotion dur="3.2s" repeatCount="indefinite"><mpath href="#path2"/></animateMotion>
    </circle>

    <path id="path3" d="M820 324 C782 372 740 420 692 470" class="lineGlow"/>
    <path d="M820 324 C782 372 740 420 692 470" class="lineSoft"/>
    <path d="M820 324 C782 372 740 420 692 470" class="lineMain arrowPulse" marker-end="url(#arrowCyan)"/>
    <circle r="5" fill="#22d3ee" class="dashDot">
      <animateMotion dur="3.4s" repeatCount="indefinite"><mpath href="#path3"/></animateMotion>
    </circle>

    <path id="path4" d="M1150 324 C1064 384 946 426 766 470" class="lineGlow"/>
    <path d="M1150 324 C1064 384 946 426 766 470" class="lineSoft"/>
    <path d="M1150 324 C1064 384 946 426 766 470" class="lineMain arrowPulse" marker-end="url(#arrowGreen)"/>
    <circle r="5" fill="#4ade80" class="dashDot">
      <animateMotion dur="3.8s" repeatCount="indefinite"><mpath href="#path4"/></animateMotion>
    </circle>
  </g>

  <!-- score card -->
  <g class="scoreCard">
    <rect x="405" y="470" width="590" height="152" rx="32" fill="url(#glass)" stroke="rgba(255,255,255,.20)" stroke-width="1.6"/>
    <text x="700" y="520" text-anchor="middle" class="midTitle">preservation + budget score</text>
    <text x="700" y="552" text-anchor="middle" class="midText">evaluate compactness, fidelity, and recovery safety</text>

    <g>
      <rect x="477" y="577" width="122" height="34" rx="17" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)" class="chip"/>
      <text x="538" y="599" text-anchor="middle" class="pillText">preservation</text>

      <rect x="612" y="577" width="88" height="34" rx="17" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)" class="chip chip2"/>
      <text x="656" y="599" text-anchor="middle" class="pillText">budget</text>

      <rect x="713" y="577" width="84" height="34" rx="17" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)" class="chip chip3"/>
      <text x="755" y="599" text-anchor="middle" class="pillText">safety</text>

      <rect x="810" y="577" width="144" height="34" rx="17" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)" class="chip chip4"/>
      <text x="882" y="599" text-anchor="middle" class="pillText">tie-break: hybrid</text>
    </g>
  </g>

  <!-- line down -->
  <g>
    <path d="M700 622 L700 670" class="downGlow"/>
    <path d="M700 622 L700 670" class="downMain"/>
    <path d="M700 670 L700 688" stroke="#67e8f9" stroke-width="5" stroke-linecap="round" fill="none" class="arrowPulse"/>
    <polygon points="700,702 688,682 712,682" fill="#67e8f9" filter="url(#glow)" class="arrowPulse"/>
  </g>

  <!-- selected card -->
  <g class="selectedCard">
    <rect x="340" y="684" width="720" height="112" rx="30" fill="url(#glass)" stroke="rgba(255,255,255,.22)" stroke-width="1.6"/>
    <text x="700" y="733" text-anchor="middle" class="midTitle">selected candidate + reason</text>
    <text x="700" y="763" text-anchor="middle" class="midText">dedup_plus_selective wins on compactness</text>
    <text x="700" y="787" text-anchor="middle" class="midText">while preserving the safest useful context</text>
  </g>
</svg>
