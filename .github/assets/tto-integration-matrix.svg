      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 700; fill: #f8fafc; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 500; fill: #cbd5e1; }
      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; fill: #e2e8f0; }
      .chip { fill: rgba(255,255,255,0.11); stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .card { fill: url(#card); stroke: rgba(255,255,255,0.20); stroke-width: 1.2; }
      .line { stroke: #67e8f9; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.86; }
      .arrow { fill: #67e8f9; }
    </style>
    
  </defs>
