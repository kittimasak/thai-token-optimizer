<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-label="Thai Token Optimizer diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 800; fill: #f8fafc; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 500; fill: #cbd5e1; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 700; fill: #f8fafc; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 500; fill: #cbd5e1; }
      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; fill: #e2e8f0; }
      .chip { fill: rgba(255,255,255,0.11); stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .card { fill: url(#card); stroke: rgba(255,255,255,0.20); stroke-width: 1.2; }
      .line { stroke: #67e8f9; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.86; }
      .arrow { fill: #67e8f9; }
    </style>
    
  </defs>
  <rect width="1200" height="580" rx="28" fill="url(#bg)"/>
  <circle cx="984" cy="104" r="170" fill="#22d3ee" opacity="0.10"/>
  <circle cx="180" cy="435" r="190" fill="#a78bfa" opacity="0.12"/>
  <text x="60" y="70" font-size="40" text-anchor="start" class="title">Before → TTO v2 → After</text><text x="60" y="106" font-size="18" text-anchor="start" class="subtitle">Reduce Thai token waste while preserving commands, code, paths, versions, and constraints</text><rect x="70" y="175" width="300" height="210" rx="28" fill="#f97316" opacity="0.16" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/><text x="102" y="227" font-size="26" text-anchor="start" class="title">BEFORE</text><text x="104" y="267" font-size="18" text-anchor="start" class="small">• Long Thai prompts</text><text x="104" y="298" font-size="18" text-anchor="start" class="small">• repetitive wording</text><text x="104" y="329" font-size="18" text-anchor="start" class="small">• commands mixed in</text><text x="104" y="360" font-size="18" text-anchor="start" class="small">• higher token cost</text><rect x="450" y="175" width="300" height="210" rx="28" fill="#a78bfa" opacity="0.16" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/><text x="482" y="227" font-size="26" text-anchor="start" class="title">TTO v2</text><text x="484" y="267" font-size="18" text-anchor="start" class="small">• compact Thai</text><text x="484" y="298" font-size="18" text-anchor="start" class="small">• code-aware preservation</text><text x="484" y="329" font-size="18" text-anchor="start" class="small">• safety mode</text><text x="484" y="360" font-size="18" text-anchor="start" class="small">• rollback discipline</text><rect x="830" y="175" width="300" height="210" rx="28" fill="#34d399" opacity="0.16" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/><text x="862" y="227" font-size="26" text-anchor="start" class="title">AFTER</text><text x="864" y="267" font-size="18" text-anchor="start" class="small">• fewer tokens</text><text x="864" y="298" font-size="18" text-anchor="start" class="small">• exact commands</text><text x="864" y="329" font-size="18" text-anchor="start" class="small">• exact paths/versions</text><text x="864" y="360" font-size="18" text-anchor="start" class="small">• reproducible output</text><path d="M372,280 L442,280" class="line"/><polygon points="442,280 432.0,285.5 432.0,274.5" class="arrow"/><path d="M752,280 L822,280" class="line"/><polygon points="822,280 812.0,285.5 812.0,274.5" class="arrow"/><rect x="255" y="455" width="690" height="56" rx="28" fill="url(#accent)" opacity="0.22" stroke="#e0f2fe" stroke-opacity="0.35"/><text x="600" y="491" font-size="20" text-anchor="middle" class="label">Core rule: reduce tokens without losing safety, correctness, or constraints</text>
</svg>